name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Smoke-test the installed package
        run: python -c "from mechanistgym.demo import run_decay_demo; assert run_decay_demo()['verification_passed']"

      - name: Run quality gates
        run: make check
