name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Smoke-test the installed package
        run: |
          python -c "from mechanistgym.demo import run_decay_demo; assert run_decay_demo()['verification_passed']"
          python -c "from mechanistgym.runtime.demo import run_checkpoint_failover_demo; result = run_checkpoint_failover_demo(); assert result['status'] == 'succeeded'; assert result['primary_calls'] == [0, 1]; assert result['fallback_calls'] == [1, 2]"

      - name: Run quality gates
        run: make check
