name: Bug report
description: Report a reproducible software or evaluation defect.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Provide the smallest commands, configuration, and input that reproduce the issue.
      render: shell
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed output or traceback
      render: text
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, package revision, solver/tool versions, and model provider if relevant.
      placeholder: |
        OS:
        Python:
        MechanistGym revision:
        External tools:
    validations:
      required: true

  - type: textarea
    id: scientific_impact
    attributes:
      label: Scientific or reproducibility impact
      description: Could this alter a metric, benchmark result, biological conclusion, or stored skill?
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I removed secrets and private or sensitive data from this report.
          required: true
        - label: I checked that an existing issue does not already describe this defect.
          required: true
